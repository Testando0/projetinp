<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GMPOL — Sistema Central</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div id="s-login" class="screen">
    <div class="login-mark">GMPOL</div>
    <div class="login-sub">Grupamento Municipal de Policiamento</div>
    <div class="login-card">
      <h2>▸ ACESSO RESTRITO</h2>
      <div class="fg"><label>Usuário</label><input type="text" id="l-user" placeholder="Login do sistema"></div>
      <div class="fg"><label>Senha</label><input type="password" id="l-pass" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-block" onclick="login()">▸ AUTENTICAR</button>
      <div class="hint-box"><p class="hint">Acesso monitorado. O uso indevido resultará em punição administrativa e bloqueio permanente.</p></div>
    </div>
  </div>

  <!-- PAINEL PRINCIPAL -->
  <div id="s-panel" class="screen">
    <header class="topbar">
      <div class="topbar-l">
        <div class="topbar-logo">GMPOL</div>
        <div class="topbar-div"></div>
        <div id="tb-badge" class="cargo-badge">CARGO</div>
      </div>
      <div class="topbar-r">
        <div id="notif-pill" class="notif-pill"><div class="notif-dot"></div><span id="notif-txt">0 PENDENTES</span></div>
        <div id="tb-user" class="topbar-user">NOME</div>
        <div class="settings-wrap">
          <button class="settings-btn" onclick="toggleSettings()">⚙</button>
          <div id="settings-menu" class="settings-menu">
            <button class="settings-item" onclick="openModal('m-senha')">🔑 Alterar Senha</button>
            <div class="settings-divider"></div>
            <button class="settings-item danger" onclick="logout()">🔒 Sair do Sistema</button>
          </div>
        </div>
      </div>
    </header>

    <nav id="tabs" class="tabs"></nav>
    <main id="content" class="content"></main>
  </div>

  <!-- MODAL: ALTERAR SENHA -->
  <div id="m-senha" class="modal-overlay">
    <div class="modal">
      <div class="modal-h"><h3>▸ ALTERAR SENHA</h3><button class="modal-close" onclick="closeModal('m-senha')">&times;</button></div>
      <div class="modal-b">
        <div class="fg"><label>Senha Atual</label><input type="password" id="s-atual"></div>
        <div class="fg"><label>Nova Senha</label><input type="password" id="s-nova"></div>
        <div class="fg"><label>Confirmar Nova Senha</label><input type="password" id="s-conf"></div>
      </div>
      <div class="modal-f">
        <button class="btn btn-ghost btn-sm" onclick="closeModal('m-senha')">CANCELAR</button>
        <button class="btn btn-primary btn-sm" onclick="alterarSenha()">SALVAR ALTERAÇÕES</button>
      </div>
    </div>
  </div>

  <!-- MODAL: NOVO USUÁRIO -->
  <div id="m-novo-user" class="modal-overlay">
    <div class="modal">
      <div class="modal-h"><h3>▸ CRIAR NOVO USUÁRIO</h3><button class="modal-close" onclick="closeModal('m-novo-user')">&times;</button></div>
      <div class="modal-b">
        <div class="fg"><label>Nome Completo</label><input type="text" id="nu-nome"></div>
        <div class="fg"><label>Login (Único)</label><input type="text" id="nu-user"></div>
        <div class="fg"><label>Cargo</label>
          <select id="nu-cargo">
            <option value="guarda">Guarda Municipal</option>
            <option value="agente">Agente de Polícia</option>
            <option value="tatico">Policiamento Tático</option>
            <option value="escrivao">Escrivão de Polícia</option>
            <option value="delegado">Delegado de Polícia</option>
            <option value="chefe">Chefe de Polícia</option>
          </select>
        </div>
        <div class="fg"><label>Senha Inicial</label><input type="password" id="nu-pass"></div>
      </div>
      <div class="modal-f">
        <button class="btn btn-ghost btn-sm" onclick="closeModal('m-novo-user')">CANCELAR</button>
        <button class="btn btn-success btn-sm" onclick="criarUsuario()">CRIAR ACESSO</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/app.js"></script>
</body>
</html>
